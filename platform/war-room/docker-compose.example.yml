# Example compose for War Room.
#
# This file is safe to version. It uses relative paths and environment
# placeholders only. Keep the real deployment compose untracked if it contains
# host-specific paths, credentials or private infrastructure details.

services:
  war-room:
    build:
      context: .
      dockerfile: Dockerfile
    image: homelab-war-room:0.1.0
    restart: unless-stopped
    environment:
      WARROOM_TIMEZONE: ${WARROOM_TIMEZONE:-UTC}
      WARROOM_SERVICE_WARROOM_URL: ${WARROOM_SERVICE_WARROOM_URL:-https://warroom.example.invalid}
      WARROOM_SERVICE_WARROOM_PROBE_URL: ${WARROOM_SERVICE_WARROOM_PROBE_URL:-https://warroom.example.invalid}
      WARROOM_SERVICE_HOMEPAGE_URL: ${WARROOM_SERVICE_HOMEPAGE_URL:-https://homepage.example.invalid}
      WARROOM_SERVICE_HOMEPAGE_PROBE_URL: ${WARROOM_SERVICE_HOMEPAGE_PROBE_URL:-https://homepage.example.invalid}
      WARROOM_SERVICE_KUMA_URL: ${WARROOM_SERVICE_KUMA_URL:-https://status.example.invalid}
      WARROOM_SERVICE_KUMA_PROBE_URL: ${WARROOM_SERVICE_KUMA_PROBE_URL:-https://status.example.invalid}
      WARROOM_SERVICE_PHP_URL: ${WARROOM_SERVICE_PHP_URL:-https://demo.example.invalid}
      WARROOM_SERVICE_PHP_PROBE_URL: ${WARROOM_SERVICE_PHP_PROBE_URL:-https://demo.example.invalid}
      WARROOM_SERVICE_CUSTOM_ID: ${WARROOM_SERVICE_CUSTOM_ID:-custom}
      WARROOM_SERVICE_CUSTOM_NAME: ${WARROOM_SERVICE_CUSTOM_NAME:-Custom Service}
      WARROOM_SERVICE_CUSTOM_URL: ${WARROOM_SERVICE_CUSTOM_URL:-https://custom.example.invalid}
      WARROOM_SERVICE_CUSTOM_PROBE_URL: ${WARROOM_SERVICE_CUSTOM_PROBE_URL:-https://custom.example.invalid}
      WARROOM_SERVICE_ADMINER_URL: ${WARROOM_SERVICE_ADMINER_URL:-https://database.example.invalid}
      WARROOM_SERVICE_ADMINER_PROBE_URL: ${WARROOM_SERVICE_ADMINER_PROBE_URL:-https://database.example.invalid}
    ports:
      - "${WARROOM_BIND:-127.0.0.1}:${WARROOM_PORT:-8090}:80"
    volumes:
      # Application code served by Apache/PHP.
      - ./public:/var/www/html:ro

      # Read-only sanitized documentation for the Manuals reader.
      - ${WARROOM_MANUALS_DIR:-../../docs/manuals}:/var/www/manuals:ro

      # Optional reviewed task/checklist state. Do not store secrets here.
      - ${WARROOM_STATE_DIR:-../../state}:/var/warroom-state:ro

      # Optional read-only runtime data generated by external exporters.
      # This directory must stay out of Git.
      - ${WARROOM_RUNTIME_DIR:-../../runtime/war-room}:/var/warroom-runtime:ro
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${WARROOM_PROXY_NETWORK:-homelab_proxy}
