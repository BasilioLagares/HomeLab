# Example compose for War Room.
#
# This file is safe to version. It uses relative paths and environment
# placeholders only. Keep the real deployment compose untracked if it contains
# host-specific paths, credentials or private infrastructure details.

services:
  war-room:
    image: php:8.3-apache
    container_name: war_room
    restart: unless-stopped
    ports:
      - "${WARROOM_BIND:-127.0.0.1}:${WARROOM_PORT:-8090}:80"
    volumes:
      # Application code served by Apache/PHP.
      - ./public:/var/www/html:ro

      # Read-only sanitized documentation for the Manuals reader.
      - ${WARROOM_MANUALS_DIR:-../../docs/manuals}:/var/www/manuals:ro

      # Optional reviewed task/checklist state. Do not store secrets here.
      - ${WARROOM_STATE_DIR:-../../state}:/var/warroom-state:ro

      # Optional read-only runtime data generated by external exporters.
      # This directory must stay out of Git.
      - ${WARROOM_RUNTIME_DIR:-../../runtime/war-room}:/var/warroom-runtime:ro
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${WARROOM_PROXY_NETWORK:-homelab_proxy}
